<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#1a1a2e"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="数学诊断">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数学诊断工作台</title>
<style>
:root{--primary:#1a1a2e;--accent:#e8912e;--accent-light:#fef5e7;--bg:#f4f5f7;--card:#fff;--border:#e8e8ec;--text:#1a1a2e;--text-sec:#5a5a72;--text-mu:#8a8a9a;--radius:12px;--shadow:0 1px 4px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);--shadow-h:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:1024px;margin:0 auto;padding:24px}
header{background:linear-gradient(135deg,#1a1a2e 0%,#25254a 100%);color:#fff;padding:40px 36px;border-radius:16px;margin-bottom:28px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-60%;right:-20%;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.03)}
header::after{content:'';position:absolute;bottom:-40%;left:10%;width:300px;height:300px;border-radius:50%;background:rgba(232,145,46,.05)}
header h1{font-size:28px;font-weight:700;margin-bottom:4px;letter-spacing:.5px;position:relative;z-index:1}
header h1 span{color:var(--accent)}
header .sub{font-size:15px;opacity:.65;margin-top:4px;position:relative;z-index:1}
.card{background:var(--card);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-h)}
.card h2{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text);border-left:4px solid var(--accent);padding-left:14px;display:flex;align-items:center;gap:8px}
.card h2 .badge{font-weight:400;font-size:13px;color:var(--text-mu);background:#f4f5f7;padding:1px 10px;border-radius:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;font-weight:600;color:var(--text-sec);letter-spacing:.2px}
.form-group input,.form-group textarea,.form-group select{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;transition:all .2s;background:var(--card);color:var(--text);font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,145,46,.12)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-mu);font-size:13px}
.form-group textarea{resize:vertical;min-height:56px;font-size:14px}
.module-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.module-item{background:#f9f9fb;padding:14px 14px 10px;border-radius:10px;border:1px solid #eeeef2;transition:border-color .2s}
.module-item:hover{border-color:#dddde5}
.module-item .mt{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:.2px;display:flex;align-items:center;justify-content:space-between}
.module-item .mt .mavg{font-size:12px;font-weight:600;color:var(--text-mu)}
.sub-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;padding:1px 0}
.sub-row .sn{font-size:11px;color:var(--text-sec);min-width:56px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.sub-row input[type=number]{flex:0 0 42px;padding:2px 4px;border:1.5px solid #e0e0e6;border-radius:4px;font-size:11px;font-weight:600;text-align:center;background:#fff;transition:border-color .15s}
.sub-row input[type=number]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,145,46,.1)}
.sub-row .spct{font-size:11px;color:var(--text-mu);margin-left:2px}
.module-item .et{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0 3px;padding-top:4px;border-top:1px solid #eeeef2}
.module-item .et label{font-size:10px;color:var(--text-sec);display:flex;align-items:center;gap:2px;cursor:pointer;padding:2px 5px;border-radius:3px;background:#fff;border:1px solid #eee;transition:all .1s}
.module-item .et label:hover{border-color:#ddd}
.module-item .et input[type=checkbox]{width:11px;height:11px;accent-color:var(--accent);cursor:pointer}
.mbar{display:flex;align-items:center;gap:5px;padding-top:3px}
.mbar .tk{flex:1;height:4px;background:#e8e8ec;border-radius:2px;overflow:hidden}
.mbar .tk .fl{height:100%;border-radius:2px;transition:width .4s ease}
.mbar .pt{font-size:11px;font-weight:700;color:var(--text-sec);min-width:30px;text-align:right}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.2px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(232,145,46,.25)}
.btn-primary:hover{background:#d48120;transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,145,46,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,26,46,.15)}
.btn-secondary:hover{background:#2a2a4e;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:var(--accent-light)}
.btn-sm{padding:8px 18px;font-size:13px}
.btn-group{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.rs{display:none;animation:fi .35s ease}
.rs.v{display:block}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rsm{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.sb{background:var(--card);padding:16px;border-radius:10px;text-align:center;border:1px solid var(--border)}
.sb .n{font-size:28px;font-weight:800;color:var(--text);line-height:1.2}
.sb .n.w{color:#d48120}.sb .n.d{color:#c0392b}.sb .n.s{color:#27ae60}
.sb .l{font-size:12px;color:var(--text-mu);margin-top:4px;font-weight:500}
.rc{background:#f9f9fb;border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-top:12px;white-space:pre-wrap;font-family:'SF Mono','Cascadia Code',Consolas,monospace;font-size:13px;line-height:1.8;max-height:600px;overflow-y:auto}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ci{background:#f9f9fb;padding:12px 16px;border-radius:10px;border:1px solid #eeeef2;display:flex;align-items:center;gap:12px}
.ci label{font-size:13px;color:var(--text-sec);flex:1;line-height:1.4}
.ci input[type=range]{flex:1;height:4px;accent-color:var(--accent);cursor:pointer}
.ci .v{font-size:15px;font-weight:700;min-width:36px;text-align:right;color:var(--text)}
.gt{display:inline-block;padding:2px 12px;border-radius:14px;font-size:12px;font-weight:600}
.gt.g7{background:#e1edf7;color:#2471a3}.gt.g8{background:#d5f0e2;color:#1e8449}.gt.g9{background:#fce9d2;color:#d48120}
.gt.g10{background:#fadbd8;color:#c0392b}.gt.g11{background:#e8daef;color:#7d3c98}.gt.g12{background:#fdebd0;color:#b7770e}
.ts{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.ts.s{opacity:1}
.ft{text-align:center;color:var(--text-mu);font-size:13px;padding:20px 0 8px;letter-spacing:.3px}
.sv-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:4px 8px;border-radius:6px;transition:background .15s}
.sv-item:hover{background:#f4f5f7}
.sv-item .sv-l{font-size:12px;min-width:72px;color:var(--text-sec);font-weight:500}
.sv-item .sv-t{flex:1;height:8px;background:#e8e8ec;border-radius:4px;overflow:hidden}
.sv-item .sv-t .sv-f{height:100%;border-radius:4px;transition:width .5s ease}
.sv-item .sv-p{font-size:13px;font-weight:700;min-width:32px;text-align:right;color:var(--text)}
@media(max-width:768px){
.container{padding:16px}header{padding:28px 20px;border-radius:12px}header h1{font-size:22px}
.card{padding:18px 16px;border-radius:10px}.form-grid,.form-grid.three,.module-grid{grid-template-columns:1fr 1fr}
.rsm{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}
}
@media(max-width:480px){.module-grid{grid-template-columns:1fr}.rsm{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header><h1><span>数学诊断</span>工作台</h1><div class="sub">初一至高三 · 专业数学诊断</div></header>

<!-- 试卷上传分析 -->
<div class="card" style="border:2px dashed #e8912e">
<h2>试卷上传与AI分析 </h2>
<p style="font-size:13px;color:#888;margin:-8px 0 12px 18px">上传学生试卷照片，自动分析错题并导入诊断</p>
<div id="paperUploadArea" style="border:2px dashed #ddd;border-radius:10px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s" onclick="document.getElementById('paperInput').click()" ondragover="this.style.borderColor='#e8912e';this.style.background='#fef5e7'" ondragleave="this.style.borderColor='#ddd';this.style.background=''" ondrop="handlePaperDrop(event)">
  <div style="font-size:40px;color:#ccc;margin-bottom:8px">📄</div>
  <div style="font-size:14px;color:#888">点击或拖拽试卷照片到此处</div>
  <div style="font-size:11px;color:#aaa;margin-top:4px">支持 JPG / PNG，建议拍照清晰</div>
  <input type="file" id="paperInput" accept="image/*" multiple style="display:none" onchange="handlePaperFiles(this.files)">
</div>
<div id="paperPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"></div>
<div id="paperActions" style="display:none">
  <div class="btn-group" style="margin:0">
    <button class="btn btn-primary btn-sm" onclick="runPaperAnalysis()" id="analyzeBtn">开始分析</button>
    <button class="btn btn-outline btn-sm" onclick="clearPaperUpload()">清空图片</button>
  </div>
</div>
<div id="paperResults" style="display:none;margin-top:12px;padding:14px;background:#f9f9fb;border-radius:10px;border:1px solid #eeeef2">
  <div id="paperSummary" style="font-size:13px;line-height:1.8;margin-bottom:8px"></div>
  <div id="paperWeakModules" style="margin-bottom:8px"></div>
  <div class="btn-group" style="margin:0">
    <button class="btn btn-secondary btn-sm" onclick="importPaperResults()" style="background:#27ae60">导入诊断结果</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('paperResults').style.display='none'">关闭</button>
  </div>
</div>
</div>



<div class="card">
<h2>学生信息</h2>
<div id="countdown" style="font-size:13px;margin:-8px 0 12px 18px"></div>
<div class="form-grid">
<div class="form-group"><label>学生姓名</label><input type="text" id="sn" placeholder="例: 张同学"></div>
<div class="form-group"><label>年级 <span id="gtag" style="font-weight:400"></span></label>
<select id="sg" onchange="onGradeChange()">
<option value="初一">初一</option><option value="初二">初二</option><option value="初三">初三</option>
<option value="高一">高一</option><option value="高二" selected>高二</option><option value="高三">高三</option>
</select></div>
<div class="form-group"><label>当前分数 / 总分</label><input type="text" id="cs" placeholder="例: 95/150"></div>
<div class="form-group"><label>目标分数 / 总分</label><input type="text" id="ts" placeholder="例: 125/150"></div>
</div>
</div>

<div class="card">
<h2>知识点诊断 <span class="badge" id="modcnt"></span></h2>
<p style="font-size:13px;color:var(--text-mu);margin:-8px 0 14px 18px">在每个子知识点右侧填写正确率，留空表示未检测</p>
<div class="module-grid" id="mg"></div>
</div>

<div class="card">
<h2>失分原因分析</h2>
<p style="font-size:13px;color:var(--text-mu);margin:-8px 0 12px 18px">拖动滑块分配各失分原因占比</p>
<div class="cg" id="cg"></div>
</div>

<div class="card">
<h2>近期考试成绩</h2>
<div class="form-grid three">
<div class="form-group"><label>第一次</label><input type="text" id="e1" placeholder="例: 87/150"></div>
<div class="form-group"><label>第二次</label><input type="text" id="e2" placeholder="例: 92/150"></div>
<div class="form-group"><label>第三次</label><input type="text" id="e3" placeholder="例: 95/150"></div>
</div>
</div>

<div class="card"><div class="form-grid">
<div class="form-group"><label>教师观察</label><textarea id="to" placeholder="例: 学生上课专注度不错, 但综合题容易放弃。"></textarea></div>
<div class="form-group"><label>家长需求</label><textarea id="pr" placeholder="例: 希望高考数学120+。"></textarea></div>
</div></div>

<div class="card"><h2>学生自述</h2><div class="form-group"><textarea id="sf" placeholder="例: 函数题做不完, 解析几何完全不会..." style="min-height:48px"></textarea></div></div>
<!-- 学习习惯量化诊断 -->
<div class="card">
<h2>学习习惯诊断</h2>
<div class="form-grid" style="grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label>错题本使用</label><select id="lh_ct"><option value="">请选择</option><option value="0">从不用错题本</option><option value="1">偶尔记一下</option><option value="2">每周整理一次</option><option value="3">每次课后都整理</option></select></div>
<div class="form-group"><label>草稿纸习惯</label><select id="lh_dr"><option value="">请选择</option><option value="0">乱涂乱画</option><option value="1">有些结构</option><option value="2">分区域书写</option><option value="3">非常规范整洁</option></select></div>
<div class="form-group"><label>限时训练</label><select id="lh_tt"><option value="">请选择</option><option value="0">从没做过</option><option value="1">偶尔做</option><option value="2">每周1-2次</option><option value="3">每次都限时</option></select></div>
<div class="form-group"><label>课堂提问</label><select id="lh_qa"><option value="">请选择</option><option value="0">从不提问</option><option value="1">听不懂才问</option><option value="2">经常提问</option><option value="3">主动追问深入</option></select></div>
<div class="form-group"><label>课后复习</label><select id="lh_rv"><option value="">请选择</option><option value="0">从不复习</option><option value="1">考前才看</option><option value="2">每周复习</option><option value="3">每次课后复习</option></select></div>
<div class="form-group"><label>作业独立性</label><select id="lh_hw"><option value="">请选择</option><option value="0">大部分搜题问人</option><option value="1">需较多提示</option><option value="2">能独立完成大部</option><option value="3">完全独立完成</option></select></div>
</div></div>
<!-- 竞争力评估 -->
<div class="card">
<h2>竞争力评估</h2>
<div class="form-grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px">
<div class="form-group"><label>班级排名</label><input type="text" id="cp_class" placeholder="例: 15/45"></div>
<div class="form-group"><label>年级排名</label><input type="text" id="cp_grade" placeholder="例: 120/500"></div>
<div class="form-group"><label>自我定位</label><select id="cp_level"><option value="">请自评</option><option value="top">前10% 优等</option><option value="mid_top">前30% 中上</option><option value="mid">中游水平</option><option value="mid_low">中下游</option><option value="bottom">靠后需紧急</option></select></div>
</div></div>
<!-- 考试策略诊断 -->
<div class="card">
<h2>考试策略诊断</h2>
<div class="form-grid" style="grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label>时间充裕度</label><select id="es_time"><option value="">请选择</option><option value="0">经常做不完</option><option value="1">勉强做完</option><option value="2">刚好够用</option><option value="3">做完还有检查时间</option></select></div>
<div class="form-group"><label>压轴题策略</label><select id="es_skip"><option value="">请选择</option><option value="0">直接放弃</option><option value="1">写了第一问就放弃</option><option value="2">尝试但容易卡住</option><option value="3">能完成大部分</option></select></div>
<div class="form-group"><label>考试焦虑</label><select id="es_anxiety"><option value="">请选择</option><option value="0">非常焦虑失常</option><option value="1">轻度紧张</option><option value="2">心态平稳</option><option value="3">越考越兴奋</option></select></div>
<div class="form-group"><label>检查习惯</label><select id="es_check"><option value="">请选择</option><option value="0">从不检查</option><option value="1">只检查选择题</option><option value="2">快速浏览一遍</option><option value="3">逐题检查一遍</option></select></div>
<div class="form-group"><label>做题顺序</label><select id="es_order"><option value="">请选择</option><option value="0">按顺序硬做</option><option value="1">先做简单的</option><option value="2">有策略地跳题</option></select></div>
<div class="form-group"><label>计算失误</label><select id="es_calc"><option value="">请选择</option><option value="0">每次都因计算扣分</option><option value="1">经常扣分</option><option value="2">偶尔扣分</option><option value="3">很少计算失误</option></select></div>
</div></div>

<div class="btn-group">
<button class="btn btn-primary" onclick="genReport()">生成科学诊断报告</button>
<button class="btn btn-outline" onclick="clearAll()">清空重来</button>
</div>

<div class="card rs" id="rs">
<h2>科学诊断报告</h2>
<div class="rsm" id="rsm"></div>
<div style="margin-bottom:12px" id="sv"></div>
 <div class="btn-group" style="margin-top:0;margin-bottom:12px">
<button class="btn btn-secondary btn-sm" onclick="copyRpt()">复制报告</button>
<button class="btn btn-outline btn-sm" onclick="printRpt()">打印</button>
<button class="btn btn-primary btn-sm" onclick="exportPdf()" style="background:#2980b9">导出PDF</button>
<button class="btn btn-secondary btn-sm" onclick="generateRoadmap()" style="background:#27ae60">生成路线图</button>
<button class="btn btn-outline btn-sm" onclick="generateBrief()">课后简报</button>
</div>
<div class="rc" id="rc"></div>
</div>

<div class="card" id="coursePlanSection" style="display:none">
<h2>课程规划 <span id="cpTitle" style="font-weight:400;font-size:14px"></span></h2>
<div id="cpContent"><div style="text-align:center;padding:20px;color:#888;font-size:13px">先生成诊断报告，然后点击"生成规划"</div></div>
<div class="btn-group" style="margin-top:12px">
<button class="btn btn-primary btn-sm" onclick="generateCoursePlan()" style="background:#27ae60">生成规划</button>
<button class="btn btn-secondary btn-sm" onclick="saveCoursePlan()">保存规划</button>
</div>
</div>

<div class="ft">数学诊断工作台</div>
</div>
<div class="ts" id="ts"></div>

<script>
var MD={
"初一":[
{id:"n1a",name:"有理数运算",subs:["加减乘除运算","乘方与科学记数法","绝对值与数轴","混合运算"]},
{id:"n1b",name:"整式",subs:["整式加减","去括号与添括号","整式化简求值"]},
{id:"n1c",name:"一元一次方程",subs:["方程解法","行程问题","工程与销售问题"]},
{id:"n1d",name:"二元一次方程组",subs:["代入消元法","加减消元法","方程组应用"]},
{id:"n1e",name:"不等式与不等式组",subs:["不等式性质","一元一次不等式","不等式组解法"]},
{id:"n1f",name:"几何初步",subs:["线段与角","相交线","平行线判定与性质"]},
{id:"n1g",name:"实数与坐标系",subs:["实数概念","平方根与立方根","平面直角坐标系"]}
],
"初二":[

// ==== 课程规划功能 ====
var planEditId = null;

function generateCoursePlan(){
  var ms = gmd();
  var name = document.getElementById("sn").value.trim() || "学生";
  var grade = document.getElementById("sg").value;
  var active = ms.filter(function(m){ return m.pct > 0; });
  if (active.length < 2) { showT("请先填写诊断数据"); return; }

  active.sort(function(a,b){ return a.pct - b.pct; });
  var totalH = 0;
  var weeks = []; var curWeek = []; var wh = 0;

  active.forEach(function(m,i){
    var weak = Math.max(65 - m.pct, 5);
    var h = Math.max(1, Math.min(6, Math.ceil(weak / 12)));
    totalH += h;
    if (wh + h > 10 && curWeek.length > 0) {
      weeks.push({ items: curWeek, th: wh }); curWeek = []; wh = 0;
    }
    curWeek.push({ name: m.name, pct: m.pct, hours: h });
    wh += h;
  });
  if (curWeek.length > 0) weeks.push({ items: curWeek, th: wh });

  var wi = 0;
  var h = '<div class="cal-weeks">';
  weeks.forEach(function(w){
    wi++;
    h += '<div class="cal-week"><div class="cal-wh">第' + wi + '周（约' + w.th + '课时）</div>';
    w.items.forEach(function(p){
      h += '<div class="cal-row"><span class="cal-mn">' + p.name + '</span>';
      h += '<span class="cal-p">当前' + p.pct + '%→</span>';
      h += '<input type="number" class="cal-hr" value="' + p.hours + '" min="1" max="10" data-name="' + p.name + '">';
      h += '<span class="cal-lbl">课时</span>';
      h += '<input type="text" class="cal-focus" value="重点突破核心题型" placeholder="教学重点">';
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="margin-top:8px;font-size:12px;color:#888">总计约 ' + totalH + ' 课时，建议每周 4-6 课时，约需 ' + Math.ceil(totalH/5) + ' 周</div>';

  document.getElementById("cpContent").innerHTML = h;
  document.getElementById("cpTitle").textContent = '- ' + name + ' (' + grade + ')';
  document.getElementById("coursePlanSection").style.display = "block";
  document.getElementById("coursePlanSection").scrollIntoView({behavior:"smooth",block:"start"});
}

function saveCoursePlan(){
  var name = document.getElementById("sn").value.trim() || "学生";
  var grade = document.getElementById("sg").value;
  var rows = document.querySelectorAll(".cal-row");
  if (!rows.length) { showT("请先生成课程规划"); return; }
  var weeks = []; var ci = 0; var curWk = [];
  document.querySelectorAll(".cal-week").forEach(function(ww){
    var items = [];
    ww.querySelectorAll(".cal-row").forEach(function(row){
      items.push({
        name: row.querySelector(".cal-mn").textContent,
        hours: parseInt(row.querySelector(".cal-hr").value) || 2,
        focus: row.querySelector(".cal-focus").value
      });
    });
    if (items.length) { weeks.push({items:items, th:items.reduce(function(s,i){return s+i.hours},0)}); }
  });
  var totalH = weeks.reduce(function(s,w){return s+w.th},0);
  var data = {student_name:name, grade:grade, total_hours:totalH, weeks_count:weeks.length, plan_data:{weeks:weeks}};

  var cpUrl = planEditId ? ("/api/courseplan/" + planEditId) : "/api/courseplan";
  var cpMethod = planEditId ? "PUT" : "POST";
  fetch(cpUrl, {method:cpMethod, headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)})
  .then(function(r){return r.json()}).then(function(d){
    if (d.success) { if (!planEditId) planEditId = d.id; showT("课程规划已保存! ID:" + (planEditId || d.id)); }
    else { showT("保存失败: " + d.error); }
  }).catch(function(){ showT("保存失败"); });
}

// ==== 数据保存功能 ====
function getStructuredData(){
  var name = document.getElementById("sn").value.trim() || "未知", grade = document.getElementById("sg").value;
  var cs = document.getElementById("cs").value.trim(), ts = document.getElementById("ts").value.trim();
  var e1 = document.getElementById("e1").value.trim(), e2 = document.getElementById("e2").value.trim(), e3 = document.getElementById("e3").value.trim();
  var sf = document.getElementById("sf").value.trim(), to = document.getElementById("to").value.trim(), pr = document.getElementById("pr").value.trim();
  
  var lh = {}; ["ct","dr","tt","qa","rv","hw"].forEach(function(k){ var el = document.getElementById("lh_"+k); if (el && el.value) lh[k] = {v:parseInt(el.value), l:el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : "" }; });
  var cp = {}; ["class","grade","level"].forEach(function(k){ var el = document.getElementById("cp_"+k); if (el && el.value) cp[k] = el.value; });
  var es = {}; ["time","skip","anxiety","check","order","calc"].forEach(function(k){ var el = document.getElementById("es_"+k); if (el && el.value) es[k] = {v:parseInt(el.value), l:el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : "" }; });
  
  var ms = gmd();
  var exams = [];
  if (e1) exams.push(e1); if (e2) exams.push(e2); if (e3) exams.push(e3);

  var tp = 0, mc = 0; ms.forEach(function(m){ if (m.pct > 0) { tp += m.pct; mc++; } });
  var ap = mc > 0 ? Math.round(tp/mc) : 0;
  var ca = gcd();

  var mods = [];
  ms.forEach(function(m){
    if (m.pct > 0) {
      var subs = [];
      Object.keys(m.subs).forEach(function(k){ subs.push({name:k, pct:m.subs[k]}); });
      mods.push({module_name:m.name, module_avg:m.pct, subtopics:subs, error_types:m.errs});
    }
  });

  return {
    student_name: name, grade: grade, modules: mods,
    current_score: cs || "", target_score: ts || "",
    teacher_observation: to, parent_requirement: pr, student_feedback: sf,
    exam_scores: exams, cause_data: ca,
    learning_habits: lh, competitive_position: cp, exam_strategy: es,
    full_report: document.getElementById("rc").textContent
  };
}

function saveData(){
  var data = getStructuredData();
  if (!data.modules || !data.modules.length) { showT("请先填写诊断数据"); return; }
  fetch("/api/diagnosis", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)})
  .then(function(r){ return r.json(); }).then(function(d){
    if (d.success) { showT("诊断报告已保存! ID:" + d.id); }
    else { showT("保存失败: " + d.error); }
  }).catch(function(){ showT("保存失败"); });
}

// ==== 路线图 ====
function generateRoadmap(){
  var ms = gmd();
  var active = ms.filter(function(m){ return m.pct > 0; });
  if (active.length < 2) { showT("请先填写诊断数据"); return; }
  active.sort(function(a,b){ return a.pct - b.pct; });
  
  var name = document.getElementById("sn").value.trim() || "学生";
  var grade = document.getElementById("sg").value;
  var ap = Math.round(active.reduce(function(s,m){return s+m.pct},0) / active.length);
  
  var r = "";
  r += "📊 " + name + "（" + grade + "）提分路线图\n";
  r += "当前平均正确率: " + ap + "%\n\n";
  r += "📌 紧急突破（正确率<50%）\n";
  active.filter(function(m){return m.pct < 50}).forEach(function(m){
    r += "  🔴 " + m.name + " (" + m.pct + "%)\n";
  });
  r += "\n📌 重点巩固（正确率50%-75%）\n";
  active.filter(function(m){return m.pct >= 50 && m.pct < 75}).forEach(function(m){
    r += "  🟡 " + m.name + " (" + m.pct + "%)\n";
  });
  r += "\n📌 保持提升（正确率>=75%）\n";
  active.filter(function(m){return m.pct >= 75}).forEach(function(m){
    r += "  🟢 " + m.name + " (" + m.pct + "%)\n";
  });
  
  var weakCount = active.filter(function(m){return m.pct < 65}).length;
  r += "\n⏱ 建议\n";
  r += "  每周" + Math.max(4, weakCount * 2) + "课时，持续" + Math.max(4, weakCount) + "周\n";
  r += "  优先突破" + active[0].name + "和" + (active[1] ? active[1].name : active[0].name) + "\n";
  
  document.getElementById("rc").textContent = r;
  showT("路线图已生成");
}

// ==== 课后简报 ====
function generateBrief(){
  var ms = gmd();
  var active = ms.filter(function(m){ return m.pct > 0; });
  if (!active.length) { showT("请先填写诊断数据"); return; }
  var name = document.getElementById("sn").value.trim() || "学生";
  
  var weakest = active.slice().sort(function(a,b){ return a.pct - b.pct; })[0];
  var r = "📋 " + name + " 课后简报\n\n";
  r += "✅ 当前最佳: " + active.slice().sort(function(a,b){return b.pct-a.pct})[0].name + " (" + Math.max.apply(null, active.map(function(m){return m.pct})) + "%)\n";
  r += "❌ 最需加强: " + weakest.name + " (" + weakest.pct + "%)\n\n";
  r += "📝 今日作业\n";
  r += "  1. " + weakest.name + " 专项练习3道\n";
  r += "  2. 错题本整理本周错题\n";
  r += "  3. 限时训练（如有余力）\n\n";
  r += "💡 下次课重点: " + weakest.name;
  
  document.getElementById("rc").textContent = r;
  showT("简报已生成");
}
